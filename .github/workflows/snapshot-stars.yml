name: Snapshot GitHub stars

# Scheduled/push-triggered, not PR-triggered — this always runs the base
# branch's own trusted script against no PR-controlled input at all, so it
# doesn't carry the "pwn request" risk that review-submission.yml is
# designed around: the push trigger only fires on commits already landed
# on main (e.g. a merged submission PR), never on a PR branch itself.
on:
  schedule:
    - cron: "17 4 * * *" # once a day, as a backstop
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - data/entries.json # so a newly merged entry's stars/created date show up without waiting for the daily run

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch star counts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/snapshot_stars.py > data/stars.json

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stars.json
          if git diff --cached --quiet; then
            echo "No star changes."
          else
            git commit -m "chore: refresh star snapshot"
            git push
          fi
